<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2Strong Financial — Agent Portal</title>
<meta name="description" content="2Strong Financial agent back-office dashboard — onboarding, training, production tracking, leaderboard, and team management." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%232563eb%22/><text x=%2212%22 y=%2216.5%22 font-size=%2211%22 font-family=%22Arial%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>2S</text></svg>" />
<style>
/* ==========================================================================
   2Strong Financial — Agent Back-Office Dashboard
   Design tokens
   ========================================================================== */
:root {
  --navy: #0a1f3f;
  --navy-2: #14294d;
  --text: #0f172a;
  --text-muted: #64748b;
  --text-faint: #94a3b8;
  --blue: #2563eb;
  --blue-600: #1d4ed8;
  --blue-50: #eff6ff;
  --blue-100: #dbeafe;
  --border: #e6e9ef;
  --bg: #ffffff;
  --bg-subtle: #f7f9fc;
  --green: #16a34a;
  --green-50: #ecfdf3;
  --amber: #b45309;
  --amber-50: #fffbeb;
  --red: #dc2626;
  --red-50: #fef2f2;
  --purple: #7c3aed;
  --purple-50: #f5f3ff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.06);
  --sidebar-w: 260px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-subtle);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
ul { list-style: none; margin: 0; padding: 0; }
h1, h2, h3, h4 { margin: 0; color: var(--navy); font-weight: 700; }
p { margin: 0; }
img { max-width: 100%; display: block; }

/* Scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: #d7dce4; border-radius: 8px; }
::-webkit-scrollbar-track { background: transparent; }

/* ==========================================================================
   App shell
   ========================================================================== */
.app-shell {
  display: flex;
  min-height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 40;
  transition: transform .25s ease;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--blue), var(--navy));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 15px;
  flex-shrink: 0;
}
.brand-text { line-height: 1.15; }
.brand-text .name { font-weight: 800; font-size: 14.5px; color: var(--navy); letter-spacing: -0.01em; }
.brand-text .sub { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
}
.nav-section-label {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 12px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: var(--navy-2);
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 2px;
  border-left: 3px solid transparent;
  transition: background .15s ease, color .15s ease;
}
.nav-item .ic {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}
.nav-item:hover { background: var(--bg-subtle); color: var(--navy); }
.nav-item:hover .ic { color: var(--navy); }
.nav-item.active {
  background: var(--blue-50);
  color: var(--blue-600);
  border-left-color: var(--blue);
}
.nav-item.active .ic { color: var(--blue); }

.sidebar-footer {
  padding: 14px;
  border-top: 1px solid var(--border);
}
.role-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-subtle);
  border: 1px solid var(--border);
}
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #4f8cf0);
  color: #fff;
  font-weight: 700;
  font-size: 12.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.role-card .who { min-width: 0; }
.role-card .who .n { font-size: 12.5px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.role-card .who .r { font-size: 11px; color: var(--text-muted); font-weight: 600; }

/* ---- Main column ---- */
.main-col {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* ---- Topbar ---- */
.topbar {
  height: 68px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 30;
}
.topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.hamburger {
  display: none;
  width: 36px; height: 36px;
  align-items: center; justify-content: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--navy);
  flex-shrink: 0;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--navy); letter-spacing: -0.01em; }
.page-crumb { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

.topbar-right { display: flex; align-items: center; gap: 12px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  color: var(--navy-2);
  position: relative;
}
.icon-btn .dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 1.5px solid #fff;
}

.role-select-wrap { position: relative; }
.role-select {
  appearance: none;
  -webkit-appearance: none;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--blue-600);
  background: var(--blue-50);
  border: 1px solid var(--blue-100);
  border-radius: 999px;
  padding: 8px 30px 8px 14px;
  cursor: pointer;
}
.role-select-wrap::after {
  content: '';
  position: absolute;
  right: 12px; top: 50%;
  width: 7px; height: 7px;
  border-right: 1.6px solid var(--blue-600);
  border-bottom: 1.6px solid var(--blue-600);
  transform: translateY(-65%) rotate(45deg);
  pointer-events: none;
}

/* ---- Page content ---- */
.page-content {
  padding: 24px;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
}
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.page-head h1 { font-size: 22px; }
.page-head .desc { color: var(--text-muted); font-size: 13.5px; margin-top: 4px; }
.head-actions { display: flex; gap: 10px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 700;
  padding: 9px 15px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--navy);
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.btn-primary:hover { background: var(--blue-600); }
.btn:hover { border-color: #c9d1de; }
.btn-sm { padding: 6px 11px; font-size: 12px; }

/* ==========================================================================
   Grid + Cards
   ========================================================================== */
.grid { display: grid; gap: 16px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-12 { grid-template-columns: repeat(12, 1fr); }
.col-span-8 { grid-column: span 8; }
.col-span-4 { grid-column: span 4; }
.col-span-7 { grid-column: span 7; }
.col-span-5 { grid-column: span 5; }
.col-span-6 { grid-column: span 6; }

.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-pad { padding: 20px; }
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 0;
}
.card-head h3 { font-size: 14.5px; }
.card-head .link { font-size: 12.5px; font-weight: 700; color: var(--blue); }

.stat-card {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.stat-top { display: flex; align-items: center; justify-content: space-between; }
.stat-label { font-size: 12.5px; color: var(--text-muted); font-weight: 600; }
.stat-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.stat-icon.blue { background: var(--blue-50); color: var(--blue); }
.stat-icon.green { background: var(--green-50); color: var(--green); }
.stat-icon.amber { background: var(--amber-50); color: var(--amber); }
.stat-icon.purple { background: var(--purple-50); color: var(--purple); }
.stat-value { font-size: 25px; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; }
.stat-foot { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; }
.stat-foot.up { color: var(--green); }
.stat-foot.down { color: var(--red); }
.stat-foot .muted { color: var(--text-muted); font-weight: 500; }

/* ==========================================================================
   Tables
   ========================================================================== */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);
  font-weight: 700;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  white-space: nowrap;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg-subtle); }
.cell-name { font-weight: 700; color: var(--navy); }
.cell-sub { font-size: 11.5px; color: var(--text-muted); font-weight: 500; }
.cell-flex { display: flex; align-items: center; gap: 10px; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge-green { background: var(--green-50); color: var(--green); }
.badge-blue { background: var(--blue-50); color: var(--blue-600); }
.badge-amber { background: var(--amber-50); color: var(--amber); }
.badge-red { background: var(--red-50); color: var(--red); }
.badge-gray { background: #f1f5f9; color: var(--text-muted); }
.badge-purple { background: var(--purple-50); color: var(--purple); }

/* Progress bar */
.progress {
  width: 100%;
  height: 7px;
  border-radius: 999px;
  background: #eef1f6;
  overflow: hidden;
}
.progress > span { display: block; height: 100%; background: var(--blue); border-radius: 999px; }

/* ==========================================================================
   Ticker (Leaderboard)
   ========================================================================== */
.ticker-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
}
.ticker-row:last-child { border-bottom: none; }
.rank-pill {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg-subtle);
  color: var(--text-muted);
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rank-pill.gold { background: #fef3c7; color: #b45309; }
.rank-pill.silver { background: #f1f5f9; color: #475569; }
.rank-pill.bronze { background: #fde3cd; color: #c2410c; }
.ticker-name { font-weight: 700; font-size: 13px; color: var(--navy); }
.ticker-sub { font-size: 11.5px; color: var(--text-muted); }
.ticker-val { margin-left: auto; font-weight: 800; font-size: 13px; color: var(--navy); }

/* ==========================================================================
   Search / filter bar
   ========================================================================== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.search-input {
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  background: var(--bg);
  min-width: 240px;
  color: var(--text-muted);
}
.search-input input {
  border: none;
  outline: none;
  font-size: 13px;
  width: 100%;
  color: var(--text);
  background: transparent;
}
.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--navy-2);
}

/* ==========================================================================
   Profile page
   ========================================================================== */
.profile-hero {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 24px;
}
.profile-hero .avatar { width: 68px; height: 68px; font-size: 24px; }
.profile-hero h2 { font-size: 19px; }
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-row .k { color: var(--text-muted); font-weight: 600; }
.info-row .v { color: var(--navy); font-weight: 700; }

/* ==========================================================================
   Events / Training cards
   ========================================================================== */
.event-card { display: flex; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.event-card:last-child { border-bottom: none; }
.event-date {
  width: 52px; height: 52px; border-radius: 10px;
  background: var(--blue-50); color: var(--blue-600);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.event-date .d { font-size: 17px; font-weight: 800; line-height: 1; }
.event-date .m { font-size: 10px; font-weight: 700; text-transform: uppercase; }

.training-card { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.training-card:last-child { border-bottom: none; }
.training-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; }

/* Empty / access notes */
.access-note {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--amber-50);
  border: 1px solid #fde8bd;
  border-radius: var(--radius-sm);
  color: #92400e;
  font-size: 12.5px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* ==========================================================================
   Auth / Login screen
   ========================================================================== */
.auth-shell {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--bg-subtle) 0%, #eef2f9 100%);
  padding: 24px;
}
.auth-card {
  width: 100%;
  max-width: 400px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-md);
  padding: 32px 28px;
}
.auth-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
.auth-title { font-size: 20px; margin-bottom: 4px; }
.auth-sub { font-size: 12.5px; color: var(--text-muted); margin-bottom: 20px; }
.auth-form { display: flex; flex-direction: column; gap: 4px; }
.auth-label { font-size: 12px; font-weight: 700; color: var(--navy-2); margin-top: 10px; margin-bottom: 4px; }
.auth-input {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13.5px;
  font-family: inherit;
  color: var(--text);
  width: 100%;
}
.auth-input:focus { outline: none; border-color: var(--blue); }
.auth-error {
  background: var(--red-50);
  color: var(--red);
  border: 1px solid #fbcaca;
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 10px;
}
.auth-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 22px 0 14px;
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .03em;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.demo-btn {
  border: 1px solid var(--border);
  background: var(--bg-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.demo-btn:hover { border-color: var(--blue); background: var(--blue-50); }
.demo-role { font-size: 10.5px; font-weight: 700; color: var(--blue-600); text-transform: uppercase; letter-spacing: .03em; }
.demo-name { font-size: 12.5px; font-weight: 700; color: var(--navy); }

.loading-block {
  padding: 60px 0;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
}

/* ==========================================================================
   Modal
   ========================================================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 31, 63, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  padding: 20px;
}
.modal-card {
  width: 100%;
  max-width: 440px;
  background: var(--bg);
  border-radius: 14px;
  box-shadow: var(--shadow-md);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-head h3 { font-size: 15.5px; }
.modal-form { padding: 18px 20px 20px; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 12px; font-weight: 700; color: var(--navy-2); margin-bottom: 5px; }
.form-field input, .form-field select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: var(--bg);
}
.form-field input:focus, .form-field select:focus { outline: none; border-color: var(--blue); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }

/* ==========================================================================
   Responsive
   ========================================================================== */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10, 31, 63, 0.35);
  z-index: 35;
}

@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .col-span-8, .col-span-7 { grid-column: span 12; }
  .col-span-4, .col-span-5 { grid-column: span 12; }
  .grid-12 { grid-template-columns: repeat(12, 1fr); }
}

@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    width: 82%;
    max-width: 300px;
  }
  .app-shell.nav-open .sidebar { transform: translateX(0); box-shadow: 0 0 0 100vmax rgba(0,0,0,0); }
  .app-shell.nav-open .overlay { display: block; }
  .main-col { margin-left: 0; }
  .hamburger { display: flex; }
  .page-content { padding: 16px; }
  .topbar { padding: 0 16px; }
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .role-select-wrap { display: none; }
  .page-head { flex-direction: column; align-items: stretch; }
  .head-actions { justify-content: flex-start; }
  .demo-grid { grid-template-columns: 1fr; }

<script>
/* ==========================================================================
   2Strong Financial — API client (talks to backend/server.py)
   ========================================================================== */
const API_BASE = "/api";

class AuthRequiredError extends Error {}

async function apiRequest(method, path, body) {
  const opts = {
    method,
    credentials: "same-origin",
    headers: {},
  };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API_BASE + path, opts);
  if (res.status === 401) throw new AuthRequiredError("Authentication required");
  let data = null;
  try { data = await res.json(); } catch (e) { data = null; }
  if (!res.ok) {
    const msg = (data && data.error) || `Request failed (${res.status})`;
    throw new Error(msg);
  }
  return data;
}

const api = {
  me: () => apiRequest("GET", "/auth/me"),
  demoAccounts: () => apiRequest("GET", "/demo-accounts"),
  login: (username, password) => apiRequest("POST", "/auth/login", { username, password }),
  logout: () => apiRequest("POST", "/auth/logout"),

  dashboard: () => apiRequest("GET", "/dashboard"),
  team: () => apiRequest("GET", "/team"),
  prospects: () => apiRequest("GET", "/prospects"),
  createProspect: (payload) => apiRequest("POST", "/prospects", payload),
  clients: () => apiRequest("GET", "/clients"),
  createClient: (payload) => apiRequest("POST", "/clients", payload),
  commissions: () => apiRequest("GET", "/commissions"),
  submitted: () => apiRequest("GET", "/submitted"),
  createSubmitted: (payload) => apiRequest("POST", "/submitted", payload),
  eapps: () => apiRequest("GET", "/eapps"),
  createEapp: (payload) => apiRequest("POST", "/eapps", payload),
  leaderboard: () => apiRequest("GET", "/leaderboard"),
  events: () => apiRequest("GET", "/events"),
  training: () => apiRequest("GET", "/training"),
  billing: () => apiRequest("GET", "/billing"),
  profile: () => apiRequest("GET", "/profile"),
  updateProfile: (payload) => apiRequest("PUT", "/profile", payload),
  changePassword: (payload) => apiRequest("POST", "/auth/change-password", payload),
};

</script>

/* -------------------------------------------------------------------------
   Helpers
   ------------------------------------------------------------------------- */
function fmtMoney(n, decimals = 0) {
  return "$" + Number(n || 0).toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtNum(n) { return Number(n || 0).toLocaleString("en-US"); }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

function statusBadge(status) {
  const map = {
    Active: "green", "In Force": "green", Paid: "green", Approved: "green", Submitted: "green", Completed: "green",
    Pending: "amber", Processing: "amber", "In Progress": "amber", "In Underwriting": "amber", "Pending License": "amber", "Awaiting E-Sign": "amber",
    "Not Started": "gray", Draft: "gray", Inactive: "gray",
    Lapsed: "red", Declined: "red", Chargeback: "red", "Requires Info": "red",
    "New Lead": "blue", Contacted: "blue", "Appointment Set": "blue", Quoted: "purple", "Not Interested": "gray",
  };
  const tone = map[status] || "gray";
  return `<span class="badge badge-${tone}">${esc(status)}</span>`;
}

function initialsAvatar(initials, size) {
  const style = size ? `style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.36)}px"` : "";
  return `<div class="avatar" ${style}>${esc(initials)}</div>`;
}

/* -------------------------------------------------------------------------
   Login screen
   ------------------------------------------------------------------------- */
async function renderLogin() {
  const root = document.getElementById("app");
  root.className = "auth-shell";
  root.innerHTML = `
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark">2S</div>
        <div class="brand-text">
          <div class="name">2Strong Financial</div>
          <div class="sub">Agent Portal</div>
        </div>
      </div>
      <h1 class="auth-title">Sign in</h1>
      <p class="auth-sub">Use your agent credentials, or jump in as a demo account below.</p>
      <form id="loginForm" class="auth-form">
        <label class="auth-label">Username</label>
        <input class="auth-input" id="loginUsername" type="text" placeholder="e.g. jordan.blake" autocomplete="username" required />
        <label class="auth-label">Password</label>
        <input class="auth-input" id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required />
        <div id="loginError" class="auth-error" style="display:none;"></div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:6px;">Sign In</button>
      </form>
      <div class="auth-divider"><span>or continue as a demo agent</span></div>
      <div id="demoAccounts" class="demo-grid"><div class="cell-sub">Loading demo accounts…</div></div>
    </div>
  `;

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    await doLogin(username, password);
  });

  try {
    const res = await api.demoAccounts();
    const grid = document.getElementById("demoAccounts");
    grid.innerHTML = res.accounts.map((a) => `
      <button class="demo-btn" data-username="${esc(a.username)}">
        <span class="demo-role">${esc(a.role)}</span>
        <span class="demo-name">${esc(a.name)}</span>
      </button>
    `).join("");
    grid.querySelectorAll(".demo-btn").forEach((btn) => {
      btn.addEventListener("click", () => doLogin(btn.dataset.username, res.password));
    });
  } catch (e) {
    document.getElementById("demoAccounts").innerHTML = `<div class="cell-sub">Could not load demo accounts.</div>`;
  }
}

async function doLogin(username, password) {
  const errEl = document.getElementById("loginError");
  if (errEl) errEl.style.display = "none";
  try {
    const res = await api.login(username, password);
    state.user = res.user;
    location.hash = "#/dashboard";
    await render();
  } catch (e) {
    if (errEl) {
      errEl.textContent = e.message || "Sign in failed";
      errEl.style.display = "block";
    }
  }
}

function openModal(kind) {
  const cfg = MODAL_CONFIG[kind];
  if (!cfg) return;
  closeModal();
  const wrap = document.createElement("div");
  wrap.className = "modal-overlay";
  wrap.id = "modalOverlay";
  wrap.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <h3>${esc(cfg.title)}</h3>
        <button class="icon-btn" id="modalClose">${ICONS.xCircle}</button>
      </div>
      <form id="modalForm" class="modal-form">
        ${cfg.fields.map((f) => `
          <div class="form-field">
            <label>${esc(f.label)}${f.required ? " *" : ""}</label>
            ${f.type === "select"
              ? `<select name="${f.key}">${f.options.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("")}</select>`
              : `<input type="${f.type}" name="${f.key}" placeholder="${esc(f.placeholder || "")}" ${f.required ? "required" : ""} />`}
          </div>
        `).join("")}
        <div id="modalError" class="auth-error" style="display:none;"></div>
        <div class="modal-actions">
          <button type="button" class="btn" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalCancel").addEventListener("click", closeModal);
  wrap.addEventListener("click", (e) => { if (e.target === wrap) closeModal(); });

  document.getElementById("modalForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {};
    cfg.fields.forEach((f) => {
      let v = fd.get(f.key);
      if (f.type === "number") v = v === "" ? 0 : Number(v);
      payload[f.key] = v;
    });
    const errEl = document.getElementById("modalError");
    errEl.style.display = "none";

    if (cfg.validate) {
      const validationError = cfg.validate(payload);
      if (validationError) {
        errEl.textContent = validationError;
        errEl.style.display = "block";
        return;
      }
    }

    const submitPayload = {};
    cfg.fields.forEach((f) => { if (!f.skipInPayload) submitPayload[f.key] = payload[f.key]; });

    try {
      await cfg.submit(submitPayload);
      if (cfg.successMessage) {
        document.getElementById("modalForm").innerHTML =
          `<div class="cell-sub" style="text-align:center;padding:24px 0;color:var(--green);font-weight:700;">${esc(cfg.successMessage)}</div>`;
        setTimeout(closeModal, 1100);
      } else {
        closeModal();
        await loadAndRenderPage();
      }
    } catch (err) {
      errEl.textContent = err.message || "Something went wrong";
      errEl.style.display = "block";
    }
  });
}
function closeModal() {
  const el = document.getElementById("modalOverlay");
  if (el) el.remove();
}

/* -------------------------------------------------------------------------
   Router / boot
   ------------------------------------------------------------------------- */
function getRouteFromHash() {
  const h = location.hash.replace(/^#\/?/, "");
  return PAGE_LOADERS[h] ? h : "dashboard";
}

async function render() {
  if (!state.user) {
    try {
      const res = await api.me();
      state.user = res.user;
    } catch (e) {
      return renderLogin();
    }
  }

  state.route = getRouteFromHash();
  const user = state.user;
  if (state.route === "team" && user.role === ROLES.ASSOCIATE) {
    location.hash = "#/dashboard";
    state.route = "dashboard";
  }

  const root = document.getElementById("app");
  root.className = "app-shell";
  root.innerHTML = `
    ${renderSidebar()}
    <div class="main-col">
      ${renderTopbar()}
      <div class="page-content" id="pageContent">
        <div class="loading-block">Loading…</div>
      </div>
    </div>
  `;
  bindShellEvents();
  await loadAndRenderPage();
}

async function loadAndRenderPage() {
  const content = document.getElementById("pageContent");
  if (!content) return;
  try {
    const data = await PAGE_LOADERS[state.route]();
    content.innerHTML = PAGE_RENDERERS[state.route](data);
    bindPageEvents();
  } catch (e) {
    if (e instanceof AuthRequiredError) {
      state.user = null;
      return renderLogin();
    }
    content.innerHTML = `<div class="card card-pad" style="text-align:center;padding:40px;color:var(--red);">Failed to load: ${esc(e.message)}</div>`;
  }
}

function bindShellEvents() {
  const hamburger = document.getElementById("hamburgerBtn");
  const overlay = document.getElementById("overlay");
  const shell = document.getElementById("app");
  if (hamburger) hamburger.addEventListener("click", () => shell.classList.toggle("nav-open"));
  if (overlay) overlay.addEventListener("click", () => shell.classList.remove("nav-open"));
  document.querySelectorAll(".nav-item").forEach((a) =>
    a.addEventListener("click", () => document.getElementById("app").classList.remove("nav-open"))
  );
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", async () => {
      await api.logout();
      state.user = null;
      location.hash = "#/dashboard";
      render();
    });
  }
}

function bindPageEvents() {
  document.querySelectorAll("[data-modal]").forEach((btn) => {
    btn.addEventListener("click", () => openModal(btn.dataset.modal));
  });
  const refreshBtn = document.getElementById("refreshBtn");
  if (refreshBtn) refreshBtn.addEventListener("click", loadAndRenderPage);
}

window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", () => {
  if (!location.hash) location.hash = "#/dashboard";
  render();
});

</script>
</body>
</html>
